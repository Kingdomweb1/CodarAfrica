<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingdom Investment Opportunities | Election Form</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial, sans-serif;
}

/* BEAUTIFUL GRADIENT BACKGROUND */

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;

background:
linear-gradient(135deg,#4f46e5,#7c3aed,#06b6d4);
background-size:400% 400%;
animation:gradientMove 10s ease infinite;
}

/* GRADIENT ANIMATION */

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* GLASS CARD */

.container{
width:100%;
max-width:1000px;

background:rgba(255,255,255,0.95);
backdrop-filter:blur(10px);

padding:35px;
border-radius:16px;

box-shadow:
0 15px 40px rgba(0,0,0,0.25);
}

/* HEADER */

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:26px;
font-weight:700;

background:linear-gradient(90deg,#4f46e5,#06b6d4);
-webkit-background-clip:text;
color:transparent;

margin-bottom:5px;
}

.header p{
font-size:14px;
color:#666;
}

/* FORM GRID */

form{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px 25px;
}

/* INPUT GROUP */

.form-group{
display:flex;
flex-direction:column;
}

label{
font-size:13px;
margin-bottom:6px;
font-weight:600;
color:#333;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;

transition:all .25s;
}

input:focus,select:focus{
outline:none;
border-color:#4f46e5;

box-shadow:0 0 0 3px rgba(79,70,229,0.15);
}

/* VOTE SECTION */

.vote-group{
grid-column:span 2;
margin-top:10px;
}

.vote-options{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:10px;
}

.vote-card{
display:flex;
align-items:center;
gap:8px;

padding:12px;

border-radius:10px;

background:#f9f9ff;

border:1px solid #ddd;

cursor:pointer;

transition:.25s;
}

.vote-card:hover{
transform:translateY(-2px);
background:linear-gradient(135deg,#eef2ff,#f0f9ff);
border-color:#4f46e5;
}

/* SUBMIT BUTTON */

button{
grid-column:span 2;

margin-top:15px;

padding:14px;

border:none;

border-radius:10px;

font-size:15px;
font-weight:600;

color:white;

background:linear-gradient(135deg,#4f46e5,#06b6d4);

cursor:pointer;

transition:.3s;
}

button:hover{
transform:translateY(-2px);

box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

/* FOOTER */

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#666;
}

/* MOBILE */

@media(max-width:700px){

form{
grid-template-columns:1fr;
}

.vote-options{
grid-template-columns:1fr;
}

button{
grid-column:span 1;
}

}
.back-btn{
display:block;
text-align:center;
margin-top:12px;
padding:12px;

background:linear-gradient(135deg,#06b6d4,#4f46e5);

color:white;
text-decoration:none;
font-weight:600;

border-radius:10px;

transition:.3s;
}

.back-btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Kingdom Investment Opportunities</h1>
<p>Investment Election Registration Form</p>
</div>

<form>

<div class="form-group">
<label>Full Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date">
</div>

<div class="form-group">
<label>Gender</label>
<select>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="form-group">
<label>Occupation</label>
<input type="text">
</div>

<div class="form-group">
<label>Company Name</label>
<input type="text">
</div>

<div class="form-group">
<label>Investment Experience</label>
<select>
<option>Beginner</option>
<option>Intermediate</option>
<option>Advanced</option>
</select>
</div>

<div class="form-group">
<label>Preferred Investment Duration</label>
<select>
<option>Short Term</option>
<option>Mid Term</option>
<option>Long Term</option>
</select>
</div>

<!-- VOTING -->

<div class="vote-group">

<label>Select Investment Vote</label>

<div class="vote-options">

<label class="vote-card">
<input type="radio" name="vote" required>
Real Estate Fund
</label>

<label class="vote-card">
<input type="radio" name="vote">
Agro Investment
</label>

<label class="vote-card">
<input type="radio" name="vote">
Tech Startup Pool
</label>

<label class="vote-card">
<input type="radio" name="vote">
Retail & Trade Capital
</label>

</div>

</div>

<button type="submit">Submit Election Form</button>


<a href="index.html" class="back-btn">← Back to Page 1</a>
</form>

<div class="footer">
Kingdom Investment Opportunities © 2026
</div>

</div>

</body>
</html>
